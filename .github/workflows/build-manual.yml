name: Build and Push (manual)

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build"
        required: true
        type: choice
        options:
          - all
          - datascience
          - astronomy
          - solarsystem
          - iraf

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL='[
            {"name":"datascience","context":".","file":"datascience/Dockerfile"},
            {"name":"astronomy","context":".","file":"astronomy/Dockerfile"},
            {"name":"solarsystem","context":".","file":"solarsystem/Dockerfile"},
            {"name":"iraf","context":".","file":"iraf/Dockerfile"}
          ]'
          IMAGE="${{ github.event.inputs.image }}"
          if [ "$IMAGE" = "all" ]; then
            FILTERED="$ALL"
          else
            FILTERED=$(echo "$ALL" | jq -c --arg img "$IMAGE" '[.[] | select(.name == $img)]')
          fi
          echo "matrix={\"image\":$(echo "$FILTERED" | jq -c .)}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      DOCKERHUB_ORG: linea

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${DOCKERHUB_ORG}/jupyter-${{ matrix.image.name }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pushed tags
        run: |
          echo "-----------------------------"
          echo "Image: $IMAGE_NAME"
          echo "Tag  : $IMAGE_NAME:$SHORT_SHA"
          echo "-----------------------------"
