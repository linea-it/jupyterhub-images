name: base
channels:
  - conda-forge
  - defaults
dependencies:
  # --- Database Access & Querying ---
  - psycopg2
  - sqlalchemy
  # --- Data Science ---
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-image
  - scikit-learn
  - dask
  # --- Astronomia ---
  - astropy
  - astroquery
  - healpy
  - photutils
  - regions
  - reproject
  - hats
  - hats-import
  - lsdb
  - pyvo
  - sbpy
  - ipyaladin
  - dustmaps
  - specutils
  - pyspeckit
  - spiceypy
  - cartopy
  # --- Interactive Visualization ---
  - bokeh
  - holoviews
  - plotly
  # --- Inference, Fitting & Machine Learning ---
  - emcee
  - corner
  - dynesty
  - astroml
  - lmfit
  - rebound
  - pyvista
  - pooch
  # --- Pip-only packages ---
  - pip
  - pip:
    - astrocut
    - pyspac
    - lineassp
    - pzserver
    - rail
    - sora-astro
    - reboundx
    - lightkurve
