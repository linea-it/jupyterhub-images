name: base
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - jupyterlab
  - numpy
  - astropy
  - matplotlib
  - scipy
  - setuptools
  - wheel
  - pandas
  - ipywidgets
  - ipyaladin
  # Extensões Lab com utilidade para notebooks PyRAF/IRAF (edição Python, Git, métricas)
  - jupytext
  - jupyterlab-git
  - jupyter-lsp
  - python-lsp-server
  - jupyter-resource-usage
  - pip
  - pip:
      # jupyter-desktop-server não está no conda-forge; sucessor mantido pela JupyterHub
      - jupyter-remote-desktop-proxy
      - pyraf
      - pypdf
